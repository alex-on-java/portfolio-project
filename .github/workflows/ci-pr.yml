name: PR CI

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}

jobs:
  permanent-history-artefacts:
    name: Permanent History Artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github/path-filters

      - name: Check for forbidden mutations
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/path-filters/permanent-history-artefacts.yml

      - name: Block forbidden mutations
        if: steps.filter.outputs.immutable_history == 'true'
        run: |
          echo "::error::This PR mutates permanent history artefacts. These files are immutable once committed. Capture new reasoning in a new record instead."
          exit 1

  changes:
    name: Detect affected projects
    needs: permanent-history-artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.affected.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: Compute affected publish-image matrix
        id: affected
        shell: bash
        run: |
          set -Eeuo pipefail
          matrix=$(pnpm exec nx show projects --affected --withTarget=publish-image --json)
          echo "$matrix" | jq empty
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    needs: permanent-history-artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: prek run --all-files
        shell: bash
        run: prek run --all-files --show-diff-on-failure

  test:
    name: Test
    needs: permanent-history-artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: nx affected -t test
        shell: bash
        run: pnpm exec nx affected -t test

  build:
    name: Build & publish image
    needs: changes
    if: needs.changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: nx run ${{ matrix.app }}:publish-image
        shell: bash
        env:
          APP: ${{ matrix.app }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
          BUILDX_CACHE_ARGS: --cache-from type=gha,scope=${{ matrix.app }} --cache-to type=gha,mode=max,scope=${{ matrix.app }}
        run: pnpm exec nx run "$APP":publish-image

  build-status:
    name: build-status
    needs: [permanent-history-artefacts, changes, lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Aggregate required-job statuses
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: build

  dispatch-pr-push:
    needs: build-status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate App token
        id: app-token
        uses: ./.github/actions/generate-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Report Initial Pending Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Dispatching provisioning request...' \
            -f context='Ephemeral Cluster'

      - name: Dispatch PR push
        id: dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: alex-on-java/portfolio-project-cluster-pool
          event-type: pr-push
          client-payload: >-
            {
              "pr": ${{ github.event.pull_request.number }},
              "branch": "${{ github.head_ref }}",
              "sha": "${{ github.event.pull_request.head.sha }}"
            }

      - name: Report Dispatch Success Status
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Provisioning request dispatched, pending status...' \
            -f context='Ephemeral Cluster'

      - name: Report Dispatch Failure Status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='failure' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Failed to dispatch provisioning request' \
            -f context='Ephemeral Cluster'
