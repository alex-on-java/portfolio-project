name: PR CI

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}

jobs:
  permanent-history-artefacts:
    name: Permanent History Artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github/path-filters

      - name: Check for forbidden mutations
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/path-filters/permanent-history-artefacts.yml

      - name: Block forbidden mutations
        if: steps.filter.outputs.immutable_history == 'true'
        run: |
          echo "::error::This PR mutates permanent history artefacts. These files are immutable once committed. Capture new reasoning in a new record instead."
          exit 1

  build:
    needs: permanent-history-artefacts
    uses: ./.github/workflows/reusable-build-push.yml
    permissions:
      contents: read
      packages: write

  build-convergence-checker:
    needs: permanent-history-artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            convergence-checker:
              - 'apps/platform/convergence-checker/**'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.convergence-checker == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        if: steps.filter.outputs.convergence-checker == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        if: steps.filter.outputs.convergence-checker == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: apps/platform/convergence-checker
          push: true
          tags: ghcr.io/alex-on-java/convergence-checker:${{ github.sha }}

  dispatch-pr-push:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate App token
        id: app-token
        uses: ./.github/actions/generate-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Report Initial Pending Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Dispatching provisioning request...' \
            -f context='Ephemeral Cluster'

      - name: Dispatch PR push
        id: dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: alex-on-java/portfolio-project-cluster-pool
          event-type: pr-push
          client-payload: >-
            {
              "pr": ${{ github.event.pull_request.number }},
              "branch": "${{ github.head_ref }}",
              "sha": "${{ github.event.pull_request.head.sha }}"
            }

      - name: Report Dispatch Success Status
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Provisioning request dispatched, pending status...' \
            -f context='Ephemeral Cluster'

      - name: Report Dispatch Failure Status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='failure' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Failed to dispatch provisioning request' \
            -f context='Ephemeral Cluster'
