name: PR CI

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}

jobs:
  build:
    uses: ./.github/workflows/reusable-build-push.yml
    permissions:
      contents: read
      packages: write

  dispatch-pr-push:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate App token
        id: app-token
        uses: ./.github/actions/generate-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Report Initial Pending Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Dispatching provisioning request...' \
            -f context='Ephemeral Cluster'

      - name: Dispatch PR push
        id: dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: alex-on-java/portfolio-project-cluster-pool
          event-type: pr-push
          client-payload: >-
            {
              "pr": ${{ github.event.pull_request.number }},
              "branch": "${{ github.head_ref }}",
              "sha": "${{ github.event.pull_request.head.sha }}"
            }

      - name: Report Dispatch Success Status
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Provisioning request dispatched, pending status...' \
            -f context='Ephemeral Cluster'

      - name: Report Dispatch Failure Status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='failure' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Failed to dispatch provisioning request' \
            -f context='Ephemeral Cluster'
