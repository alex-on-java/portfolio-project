name: PR CI

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}

jobs:
  permanent-history-artefacts:
    name: Permanent History Artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github/path-filters

      - name: Check for forbidden mutations
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/path-filters/permanent-history-artefacts.yml

      - name: Block forbidden mutations
        if: steps.filter.outputs.immutable_history == 'true'
        run: |
          echo "::error::This PR mutates permanent history artefacts. These files are immutable once committed. Capture new reasoning in a new record instead."
          exit 1

  changes:
    name: Detect affected projects
    needs: permanent-history-artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ci_matrix: ${{ steps.affected.outputs.ci_matrix }}
      publish_matrix: ${{ steps.affected.outputs.publish_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: Compute affected matrices
        id: affected
        shell: bash
        run: |
          set -Eeuo pipefail
          ci_matrix=$(pnpm exec nx show projects --affected --withTarget=ci --json)
          echo "$ci_matrix" | jq empty
          echo "ci_matrix=$ci_matrix" >> "$GITHUB_OUTPUT"

          publish_matrix=$(pnpm exec nx show projects --affected --withTarget=publish-image --json)
          echo "$publish_matrix" | jq empty
          echo "publish_matrix=$publish_matrix" >> "$GITHUB_OUTPUT"

  generic-static-checks:
    name: Generic Static Checks
    needs: permanent-history-artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: prek run --all-files (skip Nx-routed hook)
        shell: bash
        env:
          SKIP: nx-affected-lint
        run: prek run --all-files --show-diff-on-failure

  ci:
    name: ci (${{ matrix.project }})
    needs: changes
    if: needs.changes.outputs.ci_matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.ci_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: Set up Docker Buildx
        if: contains(fromJSON(needs.changes.outputs.publish_matrix), matrix.project)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: nx run ${{ matrix.project }}:ci
        shell: bash
        env:
          PROJECT: ${{ matrix.project }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
          BUILDX_CACHE_ARGS: --cache-from type=gha,scope=${{ matrix.project }} --cache-to type=gha,mode=max,scope=${{ matrix.project }}
        run: pnpm exec nx run "$PROJECT":ci

      - name: Save image to tarball
        if: contains(fromJSON(needs.changes.outputs.publish_matrix), matrix.project)
        shell: bash
        env:
          PROJECT: ${{ matrix.project }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
        run: |
          set -Eeuo pipefail
          mkdir -p dist
          docker save --output "dist/${PROJECT}.tar" "ghcr.io/alex-on-java/${PROJECT}:${IMAGE_TAG}"

      - name: Upload image artifact
        if: contains(fromJSON(needs.changes.outputs.publish_matrix), matrix.project)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-${{ matrix.project }}
          path: dist/${{ matrix.project }}.tar
          retention-days: 1
          if-no-files-found: error

  pre-publish-gate:
    name: pre-publish-gate
    needs: [permanent-history-artefacts, changes, generic-static-checks, ci]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Aggregate pre-publish statuses
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: ci

  publish-image:
    name: publish-image (${{ matrix.project }})
    needs: [changes, pre-publish-gate]
    if: always() && needs.pre-publish-gate.result == 'success' && needs.changes.outputs.publish_matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.publish_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up nx
        uses: ./.github/actions/setup-nx

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-${{ matrix.project }}
          path: dist

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Load image into local daemon
        shell: bash
        env:
          PROJECT: ${{ matrix.project }}
        run: docker load --input "dist/${PROJECT}.tar"

      - name: nx run ${{ matrix.project }}:publish-image
        shell: bash
        env:
          PROJECT: ${{ matrix.project }}
          IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec nx run "$PROJECT":publish-image

  cleanup-image-artifacts:
    name: cleanup-image-artifacts
    needs: [changes, publish-image]
    if: always() && needs.changes.outputs.publish_matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Delete uploaded image artifacts (best-effort)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          failed=0
          while read -r artifact_id; do
            [[ -z "$artifact_id" ]] && continue
            if ! gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}" >/dev/null; then
              echo "::warning::Failed to delete artifact ${artifact_id}; it will expire on the retention schedule"
              ((++failed))
            fi
          done < <(gh api --paginate "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
                    --jq '.artifacts[] | select(.name | startswith("image-")) | .id')

          if (( failed > 0 )); then
            echo "::warning::${failed} image artifact(s) could not be deleted; retention will reap them"
          fi

  build-status:
    name: build-status
    needs:
      - permanent-history-artefacts
      - changes
      - generic-static-checks
      - ci
      - pre-publish-gate
      - publish-image
      - cleanup-image-artifacts
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Aggregate required-job statuses
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: ci,publish-image,cleanup-image-artifacts

  dispatch-pr-push:
    needs: build-status
    if: always() && needs.build-status.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate App token
        id: app-token
        uses: ./.github/actions/generate-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Report Initial Pending Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Dispatching provisioning request...' \
            -f context='Ephemeral Cluster'

      - name: Dispatch PR push
        id: dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: alex-on-java/portfolio-project-cluster-pool
          event-type: pr-push
          client-payload: >-
            {
              "pr": ${{ github.event.pull_request.number }},
              "branch": "${{ github.head_ref }}",
              "sha": "${{ github.event.pull_request.head.sha }}"
            }

      - name: Report Dispatch Success Status
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='pending' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Provisioning request dispatched, pending status...' \
            -f context='Ephemeral Cluster'

      - name: Report Dispatch Failure Status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/${{ github.repository }}/statuses/"$SHA" \
            -f state='failure' \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description='Failed to dispatch provisioning request' \
            -f context='Ephemeral Cluster'
