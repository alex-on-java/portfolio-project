name: Build and Push

on:
  workflow_call:
    outputs:
      digest:
        description: Image digest
        value: ${{ jobs.build.outputs.digest }}
      image-ref:
        description: Full image reference with digest
        value: ${{ jobs.build.outputs.image-ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      image-ref: ghcr.io/alex-on-java/web-app@${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate App token
        id: app-token
        uses: ./.github/actions/generate-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.app-token.outputs.token }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend/web-app
          push: true
          tags: ghcr.io/alex-on-java/web-app:${{ github.sha }}
