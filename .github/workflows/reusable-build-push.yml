name: Build and Push

on:
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        description: GitHub App private key for GHCR authentication
        required: true
    outputs:
      digest:
        description: Image digest
        value: ${{ jobs.build.outputs.digest }}
      image-ref:
        description: Full image reference with digest
        value: ${{ jobs.build.outputs.image-ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      image-ref: ghcr.io/alex-on-java/web-app@${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate App token
        id: app-token
        uses: ./.github/actions/generate-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.app-token.outputs.token }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: apps/frontend/web-app
          push: true
          tags: ghcr.io/alex-on-java/web-app:${{ github.sha }}
