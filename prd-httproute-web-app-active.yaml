apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-app-active
  namespace: prd
spec:
  hostnames:
  - web-app.prd.pr-4.portfolio-project.buyanov.de
  parentRefs:
  - name: portfolio-edge-gateway
    namespace: edge-system
    sectionName: https
  rules:
  - backendRefs:
    - name: web-app-active
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
