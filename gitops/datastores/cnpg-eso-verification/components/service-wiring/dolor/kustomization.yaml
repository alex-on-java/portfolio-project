    fieldPath: data.roleAppRoB
  targets:
  - select:
      kind: Cluster
      labelSelector: datastore.cnpg/dolor=true
    fieldPaths:
    - spec.managed.roles.[name=ROLE5_RO_B_LOGIN].name
- source:
