apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-verification-service-app-ro-a
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 0s
  refreshPolicy: CreatedOnce
  target:
    name: cnpg-verification-service-app-ro-a
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: service_app_ro_a
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: cnpg-eso-verification-password
