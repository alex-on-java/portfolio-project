apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: cnpg-eso-service
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  cluster:
    name: CLUSTER_NAME
  name: service
  owner: service_app
  ensure: present
  databaseReclaimPolicy: retain
  schemas:
    - name: service
      owner: service_app
      ensure: present
