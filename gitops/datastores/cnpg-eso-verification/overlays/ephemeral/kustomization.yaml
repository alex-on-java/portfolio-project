apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: cnpg-eso-multidb-verification
    patch: |-
      - op: replace
        path: /spec/primaryUpdateStrategy
        value: unsupervised
      - op: replace
        path: /spec/postgresql/parameters/archive_mode
        value: "off"
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Database
    patch: |-
      - op: replace
        path: /spec/databaseReclaimPolicy
        value: delete
