apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: cnpg-eso-verification-password
spec:
  length: 32
  digits: 8
  symbols: 4
  symbolCharacters: "-_"
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-verification-bootstrap-owner
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 0s
  refreshPolicy: CreatedOnce
  target:
    name: cnpg-verification-bootstrap-owner
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: bootstrap_owner
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: cnpg-eso-verification-password
---
