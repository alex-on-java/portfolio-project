apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - generated-secrets.yaml
  - postinit-sql.yaml
  - provisioning-sql.yaml
  - cluster.yaml
  - database-lorem.yaml
  - database-ipsum.yaml
  - database-dolor.yaml
  - provisioning-jobs.yaml
  - verification.yaml
patches:
  - path: operator-roundtrip-defaults.yaml
    target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: cnpg-eso-multidb-verification
