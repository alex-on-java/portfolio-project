apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: cnpg-eso-lorem
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  cluster:
    name: cnpg-eso-multidb-verification
  name: lorem
  owner: lorem_app
  ensure: present
  databaseReclaimPolicy: delete
  schemas:
    - name: lorem
      owner: lorem_app
      ensure: present
