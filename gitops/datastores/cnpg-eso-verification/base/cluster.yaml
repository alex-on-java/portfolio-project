apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-eso-multidb-verification
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  affinity:
    podAntiAffinityType: preferred
  bootstrap:
    initdb:
      database: cnpg_eso_bootstrap
      encoding: UTF8
      localeCType: C
      localeCollate: C
      owner: bootstrap_owner
      secret:
        name: cnpg-verification-bootstrap-owner
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: cnpg-verification-postinit-sql
            key: 00-roles-and-bootstrap-hardening.sql
  enablePDB: true
  enableSuperuserAccess: false
  failoverDelay: 0
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  instances: 1
  logLevel: info
  managed:
    roles:
      - name: lorem_app_ro_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_ro
        passwordSecret:
          name: cnpg-verification-lorem-app-ro-a
      - name: lorem_app_ro_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_ro
        passwordSecret:
          name: cnpg-verification-lorem-app-ro-b
      - name: lorem_app_rw_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_rw
        passwordSecret:
          name: cnpg-verification-lorem-app-rw-a
      - name: lorem_app_rw_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_rw
        passwordSecret:
          name: cnpg-verification-lorem-app-rw-b
      - name: lorem_app_mig_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: false
        inRoles:
          - lorem_app
        passwordSecret:
          name: cnpg-verification-lorem-app-mig-a
      - name: lorem_app_mig_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: false
        inRoles:
          - lorem_app
        passwordSecret:
          name: cnpg-verification-lorem-app-mig-b
      - name: ipsum_app_ro_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_ro
        passwordSecret:
          name: cnpg-verification-ipsum-app-ro-a
      - name: ipsum_app_ro_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_ro
        passwordSecret:
          name: cnpg-verification-ipsum-app-ro-b
      - name: ipsum_app_rw_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_rw
        passwordSecret:
          name: cnpg-verification-ipsum-app-rw-a
      - name: ipsum_app_rw_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_rw
        passwordSecret:
          name: cnpg-verification-ipsum-app-rw-b
      - name: ipsum_app_mig_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: false
        inRoles:
          - ipsum_app
        passwordSecret:
          name: cnpg-verification-ipsum-app-mig-a
      - name: ipsum_app_mig_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: false
        inRoles:
          - ipsum_app
        passwordSecret:
          name: cnpg-verification-ipsum-app-mig-b
  maxSyncReplicas: 0
  minSyncReplicas: 0
  monitoring:
    customQueriesConfigMap:
      - key: queries
        name: cnpg-default-monitoring
    disableDefaultQueries: false
    enablePodMonitor: false
  postgresGID: 26
  postgresUID: 26
  postgresql:
    parameters:
      archive_mode: "on"
      archive_timeout: 5min
      dynamic_shared_memory_type: posix
      full_page_writes: "on"
      log_destination: csvlog
      log_directory: /controller/log
      log_filename: postgres
      log_rotation_age: "0"
      log_rotation_size: "0"
      log_truncate_on_rotation: "false"
      logging_collector: "on"
      max_parallel_workers: "32"
      max_replication_slots: "32"
      max_worker_processes: "32"
      shared_memory_type: mmap
      shared_preload_libraries: ""
      ssl_max_protocol_version: TLSv1.3
      ssl_min_protocol_version: TLSv1.3
      wal_keep_size: 512MB
      wal_level: logical
      wal_log_hints: "on"
      wal_receiver_timeout: 5s
      wal_sender_timeout: 5s
    syncReplicaElectionConstraint:
      enabled: false
  primaryUpdateMethod: restart
  primaryUpdateStrategy: unsupervised
  probes:
    liveness:
      isolationCheck:
        connectionTimeout: 1000
        enabled: true
        requestTimeout: 1000
  replicationSlots:
    highAvailability:
      enabled: false
    synchronizeReplicas:
      enabled: true
    updateInterval: 30
  storage:
    storageClass: standard-rwo
    resizeInUseVolumes: true
    size: 1Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
  smartShutdownTimeout: 180
  startDelay: 3600
  stopDelay: 1800
  switchoverDelay: 3600
