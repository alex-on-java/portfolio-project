apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-eso-multidb-verification
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    cnpg.io/skipWalArchiving: "enabled"
spec:
  bootstrap:
    initdb:
      database: cnpg_eso_bootstrap
      encoding: UTF8
      localeCType: C
      localeCollate: C
      owner: bootstrap_owner
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: cnpg-verification-postinit-sql
            key: 00-bootstrap-hardening.sql
  enableSuperuserAccess: false
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie@sha256:0f29b435fb501ee534cd0c555d122a6b8e90de477de8e8381c82c5e10d9a9de4
  instances: 1
  managed:
    roles:
      - name: lorem_app
        ensure: present
        login: false
        inherit: false
      - name: lorem_app_ro
        ensure: present
        login: false
        inherit: false
      - name: lorem_app_rw
        ensure: present
        login: false
        inherit: false
      - name: lorem_app_mig
        ensure: present
        login: false
        inherit: false
        inRoles:
          - lorem_app
      - name: lorem_app_ro_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_ro
        passwordSecret:
          name: cnpg-verification-lorem-app-ro-a
      - name: lorem_app_ro_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_ro
        passwordSecret:
          name: cnpg-verification-lorem-app-ro-b
      - name: lorem_app_rw_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_rw
        passwordSecret:
          name: cnpg-verification-lorem-app-rw-a
      - name: lorem_app_rw_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_rw
        passwordSecret:
          name: cnpg-verification-lorem-app-rw-b
      - name: lorem_app_mig_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - lorem_app_mig
        passwordSecret:
          name: cnpg-verification-lorem-app-mig-a
      - name: ipsum_app
        ensure: present
        login: false
        inherit: false
      - name: ipsum_app_ro
        ensure: present
        login: false
        inherit: false
      - name: ipsum_app_rw
        ensure: present
        login: false
        inherit: false
      - name: ipsum_app_mig
        ensure: present
        login: false
        inherit: false
        inRoles:
          - ipsum_app
      - name: ipsum_app_ro_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_ro
        passwordSecret:
          name: cnpg-verification-ipsum-app-ro-a
      - name: ipsum_app_ro_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_ro
        passwordSecret:
          name: cnpg-verification-ipsum-app-ro-b
      - name: ipsum_app_rw_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_rw
        passwordSecret:
          name: cnpg-verification-ipsum-app-rw-a
      - name: ipsum_app_rw_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_rw
        passwordSecret:
          name: cnpg-verification-ipsum-app-rw-b
      - name: ipsum_app_mig_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - ipsum_app_mig
        passwordSecret:
          name: cnpg-verification-ipsum-app-mig-a
      - name: dolor_app
        ensure: present
        login: false
        inherit: false
      - name: dolor_app_ro
        ensure: present
        login: false
        inherit: false
      - name: dolor_app_rw
        ensure: present
        login: false
        inherit: false
      - name: dolor_app_mig
        ensure: present
        login: false
        inherit: false
        inRoles:
          - dolor_app
      - name: dolor_app_ro_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - dolor_app_ro
        passwordSecret:
          name: cnpg-verification-dolor-app-ro-a
      - name: dolor_app_ro_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - dolor_app_ro
        passwordSecret:
          name: cnpg-verification-dolor-app-ro-b
      - name: dolor_app_rw_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - dolor_app_rw
        passwordSecret:
          name: cnpg-verification-dolor-app-rw-a
      - name: dolor_app_rw_b
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - dolor_app_rw
        passwordSecret:
          name: cnpg-verification-dolor-app-rw-b
      - name: dolor_app_mig_a
        connectionLimit: -1
        ensure: present
        login: true
        inherit: true
        inRoles:
          - dolor_app_mig
        passwordSecret:
          name: cnpg-verification-dolor-app-mig-a
