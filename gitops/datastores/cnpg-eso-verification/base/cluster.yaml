apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-eso-verification
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  bootstrap:
    initdb:
      database: cnpg_eso_app
      owner: bootstrap_owner
      secret:
        name: cnpg-verification-bootstrap-owner
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: cnpg-verification-postinit-sql
            key: 00-roles-and-grants.sql
  managed:
    roles:
      - name: app_ro_a
        ensure: present
        login: true
        inherit: true
        inRoles:
          - app_ro
        passwordSecret:
          name: cnpg-verification-app-ro-a
      - name: app_ro_b
        ensure: present
        login: true
        inherit: true
        inRoles:
          - app_ro
        passwordSecret:
          name: cnpg-verification-app-ro-b
      - name: app_rw_a
        ensure: present
        login: true
        inherit: true
        inRoles:
          - app_rw
        passwordSecret:
          name: cnpg-verification-app-rw-a
      - name: app_rw_b
        ensure: present
        login: true
        inherit: true
        inRoles:
          - app_rw
        passwordSecret:
          name: cnpg-verification-app-rw-b
      - name: app_mig_a
        ensure: present
        login: true
        inherit: false
        passwordSecret:
          name: cnpg-verification-app-mig-a
      - name: app_mig_b
        ensure: present
        login: true
        inherit: false
        passwordSecret:
          name: cnpg-verification-app-mig-b
  storage:
    storageClass: standard-rwo
    size: 1Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
