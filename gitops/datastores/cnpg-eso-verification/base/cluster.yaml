    disableDefaultQueries: true
    enablePodMonitor: false
  replicationSlots:
    highAvailability:
      enabled: false
  storage:
    storageClass: standard-rwo
    size: 1Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
