apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: cnpg-eso-dolor
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  cluster:
    name: cnpg-eso-multidb-verification
  name: dolor
  owner: dolor_app
  ensure: present
  databaseReclaimPolicy: retain
  schemas:
    - name: dolor
      owner: dolor_app
      ensure: present
