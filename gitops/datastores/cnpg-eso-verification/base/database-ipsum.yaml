apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: cnpg-eso-ipsum
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  cluster:
    name: cnpg-eso-multidb-verification
  name: ipsum
  owner: ipsum_app
  ensure: present
  databaseReclaimPolicy: retain
  schemas:
    - name: ipsum
      owner: ipsum_app
      ensure: present
