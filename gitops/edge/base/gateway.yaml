apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: portfolio-edge-gateway
  namespace: edge-system
spec:
  gatewayClassName: placeholder
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: edge-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
