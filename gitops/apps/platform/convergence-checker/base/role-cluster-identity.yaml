apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitops-convergence-checker-cluster-identity
  namespace: kargo-shared-resources
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cluster-identity"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitops-convergence-checker-cluster-identity
  namespace: kargo-shared-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitops-convergence-checker-cluster-identity
subjects:
  - kind: ServiceAccount
    name: gitops-convergence-checker
    namespace: observability
