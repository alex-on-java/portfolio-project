apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-convergence-checker
  namespace: observability
  labels:
    app: gitops-convergence-checker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitops-convergence-checker
  template:
    metadata:
      labels:
        app: gitops-convergence-checker
    spec:
      serviceAccountName: gitops-convergence-checker
      containers:
        - name: checker
          image: ghcr.io/alex-on-java/convergence-checker:sha256-placeholder
          imagePullPolicy: IfNotPresent
          env:
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: gitops-convergence-credentials
                  key: app-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gitops-convergence-credentials
                  key: private-key
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: gitops-convergence-credentials
                  key: installation-id
            - name: CONVERGENCE_CHECKER_OWNER_REPO
              value: alex-on-java/portfolio-project
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
