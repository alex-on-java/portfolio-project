apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitops-convergence-checker-heartbeat
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["gitops-convergence-heartbeat"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitops-convergence-checker-heartbeat
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitops-convergence-checker-heartbeat
subjects:
  - kind: ServiceAccount
    name: gitops-convergence-checker
