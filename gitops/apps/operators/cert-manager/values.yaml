    requests:
      cpu: 50m
      memory: 52Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 64Mi

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: cert-manager-dns@cv-driven-dev-e-commerce.iam.gserviceaccount.com
