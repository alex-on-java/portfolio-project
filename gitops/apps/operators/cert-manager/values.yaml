    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
    ephemeral-storage: 64Mi

webhook:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 64Mi

cainjector:
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 100m
      memory: 384Mi
      ephemeral-storage: 64Mi

startupapicheck:
