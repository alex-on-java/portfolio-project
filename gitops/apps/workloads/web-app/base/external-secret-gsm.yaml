apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: web-app-demo-gsm
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: web-app-demo-gsm
    creationPolicy: Owner
  data:
    - secretKey: demo-gsm
      remoteRef:
        # Invalid sentinel: every environment overlay must replace this. An
        # unpatched render fails closed instead of reading a real secret.
        key: REPLACE_IN_OVERLAY
