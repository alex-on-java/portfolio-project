apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: web-app
  labels:
    app: web-app
spec:
  replicas: 1
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app: web-app
  strategy:
    blueGreen:
      activeService: web-app-active
      previewService: web-app-preview
      autoPromotionEnabled: true
      scaleDownDelaySeconds: 35
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: ghcr.io/alex-on-java/web-app:sha256-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 64Mi
