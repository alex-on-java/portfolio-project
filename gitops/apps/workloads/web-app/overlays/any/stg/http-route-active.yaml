apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-app-active
spec:
  parentRefs:
    - name: portfolio-edge-gateway
      namespace: edge-system
      sectionName: https
  hostnames:
    - placeholder.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web-app-active
          port: 80
