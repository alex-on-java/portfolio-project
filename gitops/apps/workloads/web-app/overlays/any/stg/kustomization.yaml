apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: stg
resources:
  - ../../../base
  - http-route-active.yaml
  - http-route-preview.yaml
images:
  - name: ghcr.io/alex-on-java/web-app
    newName: ghcr.io/alex-on-java/web-app
    newTag: "sha256:placeholder"
patches:
  - target:
      kind: ExternalSecret
      name: web-app-demo-gsm
    patch: |
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: portfolio-project-web-app-demo-stg
