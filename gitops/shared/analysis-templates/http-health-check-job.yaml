apiVersion: argoproj.io/v1alpha1
kind: ClusterAnalysisTemplate
metadata:
  name: http-health-check-job
spec:
  args:
    - name: service-url
  metrics:
    - name: health
      provider:
        job:
          spec:
            backoffLimit: 1
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: curl
                    image: curlimages/curl:8.11.1
                    resources:
                      requests:
                        cpu: 50m
                        memory: 52Mi
                        ephemeral-storage: 64Mi
                      limits:
                        cpu: 200m
                        memory: 128Mi
                        ephemeral-storage: 64Mi
                    command:
                      - sh
                      - -c
                      - |
                        for i in $(seq 1 30); do
                          status=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 "{{args.service-url}}" || true)
                          if [ "$status" = "200" ]; then
                            echo "Health check passed: HTTP $status"
                            exit 0
                          fi
                          echo "Attempt $i: HTTP $status — retrying in 5s..."
                          sleep 5
                        done
                        echo "Health check failed after 30 attempts"
                        exit 1
