apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-project
resources:
  - ../../base
patches:
  - target:
      group: kargo.akuity.io
      version: v1alpha1
      kind: ProjectConfig
      name: observability-project
    patch: |
      - op: replace
        path: /spec/promotionPolicies/0/stageSelector/matchLabels
        value: {}
  - target:
      group: kargo.akuity.io
      version: v1alpha1
      kind: Warehouse
    patch: |
      - op: replace
        path: /spec/interval
        value: 30s
