apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: portfolio-project
resources:
  - ../../apps/workloads-web-app
  - ../../project
patches:
  # Auto-promote ALL stages on ephemeral clusters (empty selector matches everything)
  - target:
      group: kargo.akuity.io
      version: v1alpha1
      kind: ProjectConfig
      name: portfolio-project
    patch: |
      - op: replace
        path: /spec/promotionPolicies/0/stageSelector/matchLabels
        value: {}
  # Fast polling for quick feedback on ephemeral
  - target:
      group: kargo.akuity.io
      version: v1alpha1
      kind: Warehouse
    patch: |
      - op: replace
        path: /spec/interval
        value: 30s
