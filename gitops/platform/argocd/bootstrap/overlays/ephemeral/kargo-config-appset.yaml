apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "300"
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: kargo-config
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/alex-on-java/portfolio-project.git
        targetRevision: "{{metadata.annotations.target-revision}}"
        path: gitops/platform/kargo/overlays/ephemeral
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: -1
        syncOptions:
          - SkipDryRunOnMissingResource=true
          - ServerSideApply=true
