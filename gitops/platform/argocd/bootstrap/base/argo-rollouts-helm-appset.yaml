apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-rollouts
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: argo-rollouts
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://argoproj.github.io/argo-helm
          chart: argo-rollouts
          targetRevision: 2.40.0
          helm:
            valueFiles:
              - $values/gitops/apps/operators/argo-rollouts/values.yaml
        - repoURL: https://github.com/alex-on-java/portfolio-project.git
          targetRevision: '{{index .metadata.annotations "target-revision"}}'
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: argo-rollouts
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .spec.preserveUnknownFields
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
