apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analysis-templates
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/alex-on-java/portfolio-project.git
    targetRevision: HEAD
    path: gitops/shared/analysis-templates
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
