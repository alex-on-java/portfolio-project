apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: datastores-cnpg-eso-verification
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: datastores-cnpg-eso-verification
      namespace: argocd
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/alex-on-java/portfolio-project.git
        targetRevision: '{{index .metadata.annotations "target-revision"}}'
        path: gitops/datastores/cnpg-eso-verification/overlays/ephemeral
      destination:
        server: https://kubernetes.default.svc
        namespace: datastores
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
