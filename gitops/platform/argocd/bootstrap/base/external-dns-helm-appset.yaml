apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: external-dns
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://kubernetes-sigs.github.io/external-dns
          chart: external-dns
          targetRevision: v1.20.0
          helm:
            valueFiles:
              - $values/gitops/apps/operators/external-dns/values.yaml
            values: |
              domainFilters:
                - "{{index .metadata.annotations "branch-prefix"}}.{{index .metadata.annotations "base-domain"}}"
              txtOwnerId: "{{index .metadata.annotations "branch-prefix"}}"
              extraArgs:
                - "--zone-id-filter={{index .metadata.annotations "dns-zone-name"}}"
        - repoURL: https://github.com/alex-on-java/portfolio-project.git
          targetRevision: '{{index .metadata.annotations "target-revision"}}'
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: external-dns
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
