apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "300"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: kargo-observability
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/alex-on-java/portfolio-project.git
        targetRevision: '{{index .metadata.annotations "target-revision"}}'
        path: gitops/platform/kargo-observability/overlays/ephemeral
        kustomize:
          patches:
            - target:
                group: kargo.akuity.io
                version: v1alpha1
                kind: Warehouse
              patch: |
                - op: replace
                  path: /spec/subscriptions/1/git/branch
                  value: "{{index .metadata.annotations "target-revision"}}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: -1
        syncOptions:
          - SkipDryRunOnMissingResource=true
          - ServerSideApply=true
