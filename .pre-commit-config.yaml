repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-json
      - id: check-symlinks

  - repo: local
    hooks:
      - id: no-absolute-symlinks
        name: no absolute-path symlinks
        language: system
        entry: .pre-commit-scripts/check-absolute-symlinks
        types: [symlink]

      - id: permanent-history-artefacts
        name: permanent history artefacts are immutable
        language: system
        entry: .pre-commit-scripts/check-permanent-history-artefacts
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [-x, --source-path=SCRIPTDIR]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: lint-python-projects
        name: Lint Python projects (poe per project, parallel)
        language: system
        entry: .pre-commit-scripts/lint-python-projects
        files: \.py$|(^|/)pyproject\.toml$
        pass_filenames: true

      - id: validate-k8s-manifests
        name: K8s manifest validation (Kyverno + Kubeconform)
        language: system
        entry: uv run --project tools/k8s-validation pytest tools/k8s-validation/validators/ -q
        files: ^(gitops/|tools/k8s-validation/|mise\.toml$)
        pass_filenames: false

  - repo: https://github.com/open-policy-agent/conftest
    rev: v0.68.0
    hooks:
      - id: conftest-test
        alias: conftest-yaml
        name: conftest (YAML version pinning)
        files: (^gitops/|^\.pre-commit-config\.yaml$)
        types: [yaml]
        args: [--policy, policies/conftest]

      - id: conftest-test
        alias: conftest-toml
        name: conftest (TOML version pinning)
        files: (^mise\.toml$|(^|/)pyproject\.toml$)
        args: [--policy, policies/conftest, --parser, toml]

      - id: conftest-test
        alias: conftest-dockerfile
        name: conftest (Dockerfile version pinning)
        files: Dockerfile
        args: [--policy, policies/conftest, --parser, dockerfile]

      - id: conftest-verify
        alias: conftest-verify
        name: conftest verify (Rego unit tests)
        pass_filenames: false
        always_run: true
        args: [--policy, policies/conftest]
