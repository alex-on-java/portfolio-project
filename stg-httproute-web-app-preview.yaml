apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-app-preview
  namespace: stg
spec:
  hostnames:
  - preview-web-app.stg.pr-17.portfolio-project.buyanov.de
  parentRefs:
  - name: portfolio-edge-gateway
    namespace: edge-system
    sectionName: https
  rules:
  - backendRefs:
    - name: web-app-preview
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
